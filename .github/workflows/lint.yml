name: Lint

on: 
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  find:
    name: Find add-ons
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.addons.outputs.addons }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        
      - name: 🔍 Find add-on directories
        id: addons
        run: |
          declare -a found_addons
          for addon in $(find ./ -name config.yaml | cut -d "/" -f2 | sort -u); do
            found_addons+=("\"${addon}\",");
          done
          addons=$(echo ${found_addons[@]} | rev | cut -c 2- | rev)
          echo "Add-ons found: ${addons}"
          echo "::set-output name=addons::[${addons}]"


  lint:
    name: Lint add-on ${{ matrix.path }}
    runs-on: ubuntu-latest
    needs: find
    strategy:
      matrix: 
        path: ${{ fromJson(needs.find.outputs.addons) }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: 🚀 Run Home Assistant Add-on Lint
        uses: frenck/action-addon-linter@2bd8faa8a6e3598b22bccf2dc809e7870b4f1244 # main
        with:
          path: "./${{ matrix.path }}"